<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Todo Project{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light border-bottom">
      <div class="container">
        <a class="navbar-brand" href="/">Todo Project</a>
        <div class="navbar-nav me-auto">
          <a class="nav-link" href="/">Home</a>
          <a class="nav-link" href="/about">About</a>
          {% if session.user_id %}
          <a class="nav-link" href="/todo">Todo</a>
          <a class="nav-link" href="/stampa">Stampa</a>
          {% endif %}
        </div>
        <div class="navbar-nav ms-auto">
          {% if session.user_id %}
            <span class="nav-link text-muted">👤 {{ session.username }}</span>
            <a class="nav-link" href="/logout">Logout</a>
          {% else %}
            <a class="nav-link" href="/login">Login</a>
            <a class="nav-link" href="/register">Registrati</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <h1 class="h3 mb-3">{% block page_title %}Todo Project{% endblock %}</h1>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
